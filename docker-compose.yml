services:
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    image: telecom-deploy-nginx:latest
    restart: unless-stopped
    depends_on:
      spa:
        condition: service_healthy
      reportespiolis:
        condition: service_healthy
      informe-agua:
        condition: service_healthy
    ports:
      - "${WEB_HTTP_PORT:-80}:80"
      - "${WEB_HTTPS_PORT:-443}:443"
    volumes:
      - nginx_certs:/etc/nginx/certs
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -q --no-check-certificate -O - https://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - telecom_network

  spa:
    build:
      context: ./sources/telecom-spa
      dockerfile: ../../dockerfiles/spa.Dockerfile
      args:
        INSECURE_TLS_BUILD: "${SPA_INSECURE_TLS_BUILD:-0}"
    image: telecom-spa:local
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DEUDORES_DB_PATH: /app/data/deudores.sqlite
      INTERNALS_XLSX_PATH: /app/data/internos.xlsx
      SESSION_SECRET: "${SESSION_SECRET:-change-me-to-a-random-64-char-string}"
      SESSION_COOKIE_SECURE: "${SESSION_COOKIE_SECURE:-1}"
      USERS_JSON_PATH: /app/data/users.json
      USER_ADMIN_PASSWORD: "${USER_ADMIN_PASSWORD}"
      USER_OPERADOR_PASSWORD: "${USER_OPERADOR_PASSWORD}"
      USER_SERVICOOP_PASSWORD: "${USER_SERVICOOP_PASSWORD}"
    volumes:
      - ./data/spa:/app/data
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - telecom_network

  reportespiolis:
    build:
      context: ./sources/telecom-reportespiolis
      dockerfile: ../../dockerfiles/reportespiolis.Dockerfile
      args:
        INSECURE_TLS_BUILD: "${REPORTES_INSECURE_TLS_BUILD:-0}"
    image: telecom-reportespiolis:local
    restart: unless-stopped
    env_file:
      - ./sources/telecom-reportespiolis/.env
    environment:
      DB_PATH: /app/data/database.sqlite
    volumes:
      - /mnt/compartido:/mnt/compartido:ro
      - ./data/reportes:/app/data
      - ./data/reportes-logs:/app/logs
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - telecom_network

  informe-agua:
    build:
      context: ./sources/telecom-informe-agua
      dockerfile: ../../dockerfiles/informe-agua.Dockerfile
      args:
        INSECURE_TLS_BUILD: "${INFORME_AGUA_INSECURE_TLS_BUILD:-0}"
    image: telecom-informe-agua:local
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SESSION_SECRET: "${SESSION_SECRET:-change-me-to-a-random-64-char-string}"
      REPORTES_DB_PATH: /app/data/reportes/database.sqlite
      LOCAL_DB_PATH: /app/data/local/config.sqlite
      WORKER_INTERVAL_MS: "${WORKER_INTERVAL_MS:-300000}"
    volumes:
      - ./data/reportes:/app/data/reportes
      - ./data/informe-agua:/app/data/local
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      reportespiolis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/informe-agua/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - telecom_network

volumes:
  nginx_certs:

networks:
  telecom_network:
    name: telecom_stack_network
