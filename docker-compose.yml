services:
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    image: telecom-deploy-nginx:latest
    restart: unless-stopped
    environment:
      BASIC_AUTH_USER: "${BASIC_AUTH_USER:-change-me}"
      BASIC_AUTH_PASS: "${BASIC_AUTH_PASS:-change-me-strong-password}"
    depends_on:
      - spa
      - reportespiolis
    ports:
      - "${WEB_HTTPS_PORT:-443}:443"
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -q --no-check-certificate -O - https://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - telecom_network

  spa:
    build:
      context: ./sources/telecom-spa
      dockerfile: ../../dockerfiles/spa.Dockerfile
      args:
        INSECURE_TLS_BUILD: "${SPA_INSECURE_TLS_BUILD:-0}"
    image: telecom-spa:local
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DEUDORES_DB_PATH: /app/data/deudores.sqlite
      INTERNALS_XLSX_PATH: /app/data/internos.xlsx
    volumes:
      - spa_data:/app/data
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - telecom_network

  reportespiolis:
    build:
      context: ./sources/telecom-reportespiolis
      dockerfile: ../../dockerfiles/reportespiolis.Dockerfile
    image: telecom-reportespiolis:local
    restart: unless-stopped
    env_file:
      - ./sources/telecom-reportespiolis/.env
    environment:
      DB_PATH: /app/data/database.sqlite
    volumes:
      - /mnt/compartido:/mnt/compartido:ro
      - reportes_data:/app/data
      - reportes_logs:/app/logs
    networks:
      - telecom_network

volumes:
  spa_data:
  reportes_data:
  reportes_logs:

networks:
  telecom_network:
    name: telecom_stack_network
